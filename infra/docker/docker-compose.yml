services:
  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  hardhat:
    image: node:20
    working_dir: /workspace
    volumes:
      - ../..:/workspace
    command: sh -lc "npm install && npm run contracts:compile && npx hardhat node --config packages/contracts/hardhat.config.ts"
    ports:
      - "8545:8545"

  api:
    image: node:20
    working_dir: /workspace
    volumes:
      - ../..:/workspace
    environment:
      PORT: 4000
      MONGODB_URI: mongodb://mongo:27017/halal_supply_chain
      VERIFY_BASE_URL: http://localhost:5173/verify
      STORAGE_DRIVER: local
      STORAGE_BASE_PATH: /workspace/uploads
      BLOCKCHAIN_RPC_URL: http://hardhat:8545
    command: sh -lc "npm install && npm run dev:api"
    depends_on:
      - mongo
      - hardhat
    ports:
      - "4000:4000"

  worker:
    image: node:20
    working_dir: /workspace
    volumes:
      - ../..:/workspace
    environment:
      MONGODB_URI: mongodb://mongo:27017/halal_supply_chain
      BLOCKCHAIN_RPC_URL: http://hardhat:8545
      VERIFY_BASE_URL: http://localhost:5173/verify
    command: sh -lc "npm install && npm run dev:worker"
    depends_on:
      - mongo
      - api

  web:
    image: node:20
    working_dir: /workspace
    volumes:
      - ../..:/workspace
    environment:
      VITE_API_URL: http://localhost:4000
    command: sh -lc "npm install && npm run dev:web -- --host 0.0.0.0"
    depends_on:
      - api
    ports:
      - "5173:5173"

volumes:
  mongo-data:
